spring.application.name=bnpe-demo-backend
server.port=8080

spring.datasource.url=jdbc:mysql://localhost:3306/bnpe_demo_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.jackson.time-zone=Africa/Libreville
spring.jpa.open-in-view=false